name: CI - 静态文件检查 | Static Files Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: 验证 | Validate
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码 | Checkout
        uses: actions/checkout@v4

      - name: 检查文件存在 | Verify files exist
        run: |
          echo "检查核心文件..."
          test -f public/dashboard.html && echo "✅ dashboard.html"
          test -f public/index.html && echo "✅ index.html"
          test -f public/manifest.json && echo "✅ manifest.json"
          test -f public/sw.js && echo "✅ sw.js"
          echo "所有文件检查通过！"

      - name: HTML语法检查 | HTML lint
        run: |
          # Basic check - ensure HTML is well-formed
          for f in public/*.html; do
            if head -1 "$f" | grep -q "DOCTYPE"; then
              echo "✅ $f - DOCTYPE found"
            else
              echo "❌ $f - missing DOCTYPE"
              exit 1
            fi
          done
